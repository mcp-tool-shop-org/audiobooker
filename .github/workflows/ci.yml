name: CI

on:
  push:
    branches: [main]
    paths:
      - 'audiobooker/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'audiobooker/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check audiobooker/

      - name: Import gate
        run: |
          python -c "
          import audiobooker
          from audiobooker.renderer.engine import render_chapter, render_project, RenderError, RenderSummary
          from audiobooker.renderer.protocols import TTSEngine, SynthesisResult, FFmpegRunner, RunResult
          from audiobooker.renderer.ffmpeg_runner import RealFFmpegRunner
          from audiobooker.renderer.output import assemble_m4b, AssemblyResult, generate_chapter_metadata
          from audiobooker.renderer.cache_manifest import CacheManifest, load_manifest, save_manifest
          from audiobooker.renderer.hash_utils import sha256_text, sha256_json, chapter_text_hash, casting_hash, render_params_hash
          from audiobooker.casting.voice_registry import validate_voices, get_available_voices
          from audiobooker.casting.voice_suggester import VoiceSuggester, VoiceSuggestion
          from audiobooker.language.profile import LanguageProfile, get_profile, available_profiles
          from audiobooker.language.en import ENGLISH
          from audiobooker.nlp.booknlp_adapter import BookNLPAdapter, BookNLPResult
          from audiobooker.nlp.speaker_resolver import SpeakerResolver
          from audiobooker.nlp.emotion import EmotionInferencer, EmotionResult
          from audiobooker.renderer.progress import RenderProgressTracker
          from audiobooker.renderer.failure_report import RenderFailureReport
          assert get_profile('en').code == 'en'
          assert BookNLPAdapter().is_available() == False
          print('All imports OK')
          "

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_e2e_smoke.py \
            -k "not requires_voice_soundboard and not requires_ffmpeg" \
            --cov=audiobooker --cov-report=xml --cov-report=term-missing

      - name: Test CLI
        run: |
          audiobooker --help
          audiobooker voices --help || true
          audiobooker new --help || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install pip-audit
      - run: pip-audit --strict --desc || true
